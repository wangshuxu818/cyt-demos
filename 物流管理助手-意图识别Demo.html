<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物流管理助手 — 意图识别交互原型</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",tahoma,arial,sans-serif;font-size:12px;color:#333;background:#ecf0f4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* 顶栏 */
.topbar{height:44px;background:linear-gradient(180deg,#0a3d6b,#01224f);display:flex;align-items:center;padding:0 16px;gap:20px;flex-shrink:0;z-index:100}
.topbar-logo{color:#fff;font-size:15px;font-weight:700;letter-spacing:1px}
.topbar-nav a{color:rgba(255,255,255,.75);text-decoration:none;font-size:13px;padding:0 14px;height:44px;display:inline-flex;align-items:center}
.topbar-nav a:hover,.topbar-nav a.active{color:#fff;background:rgba(255,255,255,.12);border-bottom:2px solid #23c2ff}
/* 侧边栏 */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;background:#fff;border-right:1px solid #d3d3d3;flex-shrink:0;overflow-y:auto}
.sidebar-group-title{font-size:12px;color:#999;padding:8px 14px 4px}
.sidebar-item{height:34px;padding:0 14px;display:flex;align-items:center;font-size:13px;color:#333;cursor:pointer;white-space:nowrap;overflow:hidden}
.sidebar-item:hover{background:#e4eef6;color:#0097cf}
.sidebar-item.active{background:#a9dafb;color:#0097cf}
/* 主内容 */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* 顶部 tab 演示选择 */
.demo-nav{background:#fff;border-bottom:1px solid #d3d3d3;padding:0 14px;display:flex;align-items:center;gap:2px;flex-shrink:0}
.demo-tab{height:36px;padding:0 16px;display:inline-flex;align-items:center;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.demo-tab:hover{color:#0097cf}
.demo-tab.active{color:#0097cf;font-weight:600;border-bottom-color:#0097cf}
/* 两栏布局 */
.content-wrap{flex:1;overflow:hidden;display:flex;gap:0}
/* 左侧：对话区 */
.chat-col{width:480px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #d3d3d3}
.chat-header{padding:10px 14px;background:#f0f6fa;border-bottom:1px solid #d3d3d3;font-size:13px;font-weight:700;color:#0097cf;display:flex;align-items:center;gap:8px}
.chat-header span.badge{background:#532fe6;color:#fff;font-size:11px;padding:1px 6px;border-radius:3px}
.chat-messages{flex:1;overflow-y:auto;padding:14px 14px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.avatar-ai{background:linear-gradient(135deg,#0cace7,#0097cf);color:#fff}
.avatar-user{background:linear-gradient(135deg,#532fe6,#4788ec);color:#fff}
.msg-bubble{max-width:78%;padding:9px 12px;border-radius:6px;font-size:12px;line-height:1.7}
.ai-bubble{background:#f5f7fa;color:#333;border-radius:2px 8px 8px 8px;border:1px solid #e8edf3}
.user-bubble{background:linear-gradient(135deg,#0c5fa3,#0cace7);color:#fff;border-radius:8px 2px 8px 8px}
/* 对话中的识别卡片 */
.intent-card{background:#fff;border:1px solid #d3d3d3;border-radius:4px;margin:6px 0;padding:10px 12px;font-size:12px}
.intent-card-title{font-size:11px;color:#999;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.intent-card-title::before{content:'';display:inline-block;width:3px;height:11px;background:#0097cf;border-radius:2px}
.intent-row{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid #f5f7fa}
.intent-row:last-child{border-bottom:none}
.intent-lbl{width:72px;color:#999;flex-shrink:0}
.intent-val{color:#333;font-weight:600}
.intent-val.hi{color:#0097cf}
.intent-val.warn{color:#e35d00}
.conf-bar-wrap{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden;margin:0 8px}
.conf-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#0cace7,#23c2ff)}
.conf-pct{width:30px;font-size:11px;font-weight:700;color:#0097cf;text-align:right}
/* 缺失槽位追问 */
.slot-ask{background:#fffbea;border:1px solid #ffe58f;border-radius:4px;padding:8px 10px;margin:4px 0;font-size:12px;color:#7a5c00}
.slot-ask b{color:#e35d00}
/* 确认卡片 */
.confirm-card{background:#f0f8ff;border:1px solid #b8d8f0;border-radius:4px;padding:10px 12px;margin:6px 0}
.confirm-card-title{font-size:11px;color:#0097cf;margin-bottom:8px;font-weight:700}
.confirm-row{display:flex;gap:6px;padding:3px 0;font-size:12px}
.confirm-lbl{width:60px;color:#999;flex-shrink:0}
.confirm-val{color:#333;font-weight:600}
.btn-row{display:flex;gap:8px;margin-top:10px}
.fn-btn{height:26px;padding:0 12px;border-radius:2px;font-size:12px;cursor:pointer;border:none;display:inline-flex;align-items:center}
.fn-btn-primary{background:linear-gradient(270deg,#0cace7,#23c2ff);color:#fff}
.fn-btn-primary:hover{opacity:.9}
.fn-btn-default{background:linear-gradient(-180deg,#fff,#f7f7f7);border:1px solid #b9ccd7;color:#0097cf}
.fn-btn-default:hover{background:#378cbe;color:#fff;border-color:#378cbe}
.fn-btn-danger{background:linear-gradient(-180deg,#fff,#f7f7f7);border:1px solid #f5c6c6;color:#f12222}
/* 成功卡片 */
.success-card{background:#f0fff4;border:1px solid #b7eb8f;border-radius:4px;padding:10px 12px;margin:6px 0;font-size:12px}
/* 多选推荐 */
.rec-list{display:flex;flex-direction:column;gap:6px;margin:6px 0}
.rec-item{border:1px solid #d3d3d3;border-radius:4px;padding:8px 10px;cursor:pointer;font-size:12px;transition:all .15s}
.rec-item:hover{border-color:#0097cf;background:#f0f8ff}
.rec-item.selected{border-color:#0097cf;background:#e2f7ff}
.rec-item-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.rec-rank{width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.r1{background:linear-gradient(135deg,#f6c000,#e8a000)}
.r2{background:#b0b8c1}.r3{background:#b87333}
.rec-reason{font-size:11px;color:#0097cf;background:#e2f7ff;padding:1px 6px;border-radius:3px}
/* 输入区 */
.chat-input-area{border-top:1px solid #d3d3d3;padding:10px 12px;background:#fafbfc;display:flex;flex-direction:column;gap:8px}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap}
.quick-btn{padding:3px 10px;border:1px solid #b9ccd7;border-radius:12px;font-size:11px;color:#0097cf;cursor:pointer;background:#fff;white-space:nowrap}
.quick-btn:hover{background:#0097cf;color:#fff;border-color:#0097cf}
.input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;border:1px solid rgba(34,36,38,.2);border-radius:2px;padding:5px 8px;font-size:12px;resize:none;outline:none;font-family:inherit;color:#333}
.chat-textarea:focus{border-color:#0097cf;background:#e2f7ff}
/* 右侧：意图引擎可视化 */
.engine-col{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.panel-card{background:#fff;border:1px solid #d3d3d3;border-radius:4px;overflow:hidden}
.panel-card-hd{background:#f0f6fa;padding:8px 12px;font-size:13px;font-weight:700;color:#0097cf;border-bottom:1px solid #d3d3d3;display:flex;align-items:center;justify-content:space-between}
.panel-card-bd{padding:12px}
/* 五层漏斗 */
.funnel{display:flex;flex-direction:column;gap:4px}
.funnel-layer{border-radius:3px;overflow:hidden;border:1px solid #e0e7f0}
.funnel-layer-hd{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;font-weight:600}
.funnel-layer-bd{padding:6px 12px 8px;font-size:11px;color:#666;background:#fafbfc;border-top:1px solid #f0f2f5}
.layer-num{width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.layer-status{margin-left:auto;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:600}
.st-hit{background:#e8f8f0;color:#14aa65}
.st-skip{background:#f0f6fa;color:#999}
.st-active{background:#e2f7ff;color:#0097cf}
.st-wait{background:#f5f7fa;color:#bbb}
/* 实体提取 */
.entity-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.entity-chip{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;border:1px solid}
.ec-action{background:#e8f8f0;color:#14aa65;border-color:#b7eb8f}
.ec-route{background:#e2f7ff;color:#0097cf;border-color:#91d5ff}
.ec-weight{background:#fff7e6;color:#d46b08;border-color:#ffd591}
.ec-cargo{background:#f9f0ff;color:#531dab;border-color:#d3adf7}
.ec-plate{background:#fff0f6;color:#c41d7f;border-color:#ffadd2}
.ec-time{background:#f0f5ff;color:#1d39c4;border-color:#adc6ff}
.ec-unknown{background:#f5f5f5;color:#8c8c8c;border-color:#d9d9d9}
/* 意图置信度对比 */
.intent-bars{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.intent-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.intent-name{width:70px;color:#333;font-weight:600;flex-shrink:0;font-size:11px}
.ibar-wrap{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.ibar{height:100%;border-radius:4px;transition:width .4s ease}
.ibar-primary{background:linear-gradient(90deg,#0cace7,#23c2ff)}
.ibar-secondary{background:linear-gradient(90deg,#aaa,#ccc)}
.ibar-low{background:linear-gradient(90deg,#e8edf3,#d3d3d3)}
.ipct{width:32px;font-size:11px;font-weight:700;text-align:right;flex-shrink:0}
/* 槽位状态 */
.slot-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.slot-table th{background:#f0f6fa;padding:5px 8px;text-align:left;font-weight:600;color:#666;border:1px solid #d3d3d3}
.slot-table td{padding:5px 8px;border:1px solid #eee;vertical-align:middle}
.slot-ok{color:#14aa65;font-weight:700}
.slot-miss{color:#f12222;font-weight:700}
.slot-infer{color:#e35d00;font-weight:700}
/* 状态机 */
.state-machine{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.state-node{padding:5px 14px;border-radius:14px;font-size:12px;font-weight:600;border:2px solid}
.sn-idle{background:#f5f5f5;color:#999;border-color:#d9d9d9}
.sn-classify{background:#e2f7ff;color:#0097cf;border-color:#91d5ff}
.sn-execute{background:#e8f8f0;color:#14aa65;border-color:#b7eb8f}
.sn-ask{background:#fff7e6;color:#d46b08;border-color:#ffd591}
.sn-confirm{background:#f0f5ff;color:#1d39c4;border-color:#adc6ff}
.state-arrow{color:#bbb;font-size:16px;font-weight:700}
.state-node.current{box-shadow:0 0 0 3px rgba(0,151,207,.25)}
/* thinking */
.thinking{display:flex;align-items:center;gap:6px;font-size:12px;color:#0097cf;padding:8px 12px;background:#f0f8ff;border:1px solid #b8d8f0;border-radius:4px}
.dots span{display:inline-block;width:6px;height:6px;background:#0097cf;border-radius:50%;margin:0 1px;animation:blink 1s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* 场景选择 */
.scene-bar{background:#fff;border-bottom:1px solid #d3d3d3;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.scene-label{font-size:12px;color:#666}
.scene-btn{padding:3px 12px;border:1px solid #b9ccd7;border-radius:2px;font-size:12px;color:#0097cf;cursor:pointer;background:#fff}
.scene-btn:hover,.scene-btn.active{background:#0097cf;color:#fff;border-color:#0097cf}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">财运通</div>
  <nav class="topbar-nav">
    <a href="#" class="active">智能助手</a>
    <a href="#">运单管理</a>
    <a href="#">车辆管理</a>
    <a href="#">数据报表</a>
  </nav>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-group-title">智能助手</div>
    <div class="sidebar-item active">💬 物流助手</div>
    <div class="sidebar-item">📋 对话记录</div>
    <div class="sidebar-group-title">快捷功能</div>
    <div class="sidebar-item">➕ 快速建单</div>
    <div class="sidebar-item">🚛 找空车</div>
    <div class="sidebar-item">📊 数据查询</div>
    <div class="sidebar-item">🔗 单据匹配</div>
    <div class="sidebar-item">📥 批量导入</div>
  </div>
  <div class="main">
    <div class="demo-nav">
      <div class="demo-tab active" onclick="switchDemo('chat')">对话演示</div>
      <div class="demo-tab" onclick="switchDemo('engine')">意图引擎详解</div>
      <div class="demo-tab" onclick="switchDemo('funnel')">五层漏斗</div>
    </div>
    <!-- 场景快选 -->
    <div class="scene-bar">
      <span class="scene-label">演示场景：</span>
      <button class="scene-btn active" onclick="loadScene(0)">建单（高置信）</button>
      <button class="scene-btn" onclick="loadScene(1)">找车（中置信·追问）</button>
      <button class="scene-btn" onclick="loadScene(2)">查数据（低置信）</button>
      <button class="scene-btn" onclick="loadScene(3)">匹配单据</button>
      <button class="scene-btn" onclick="loadScene(4)">批量导入</button>
      <button class="scene-btn" onclick="loadScene(5)">意图边界消歧</button>
    </div>
    <div class="content-wrap">
      <!-- 左侧对话 -->
      <div class="chat-col" id="chatCol">
        <div class="chat-header">
          <span>物流管理助手</span>
          <span class="badge">AI</span>
          <span style="margin-left:auto;font-size:11px;color:#14aa65;font-weight:600">● 在线</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="quick-btns" id="quickBtns"></div>
          <div class="input-row">
            <textarea class="chat-textarea" id="chatInput" rows="2" placeholder="输入运输指令，支持自然语言…" onkeydown="inputKeyDown(event)"></textarea>
            <button class="fn-btn fn-btn-primary" onclick="sendMsg()" style="height:46px;padding:0 16px">发送</button>
          </div>
        </div>
      </div>
      <!-- 右侧引擎可视化 -->
      <div class="engine-col" id="engineCol">
        <!-- 状态机 -->
        <div class="panel-card">
          <div class="panel-card-hd">会话状态机 <span style="font-size:11px;font-weight:400;color:#999">当前状态</span></div>
          <div class="panel-card-bd">
            <div class="state-machine" id="stateMachine">
              <div class="state-node sn-idle current" id="sn_idle">空闲</div>
              <div class="state-arrow">→</div>
              <div class="state-node sn-classify" id="sn_classify">意图判断</div>
              <div class="state-arrow">→</div>
              <div class="state-node sn-execute" id="sn_execute">执行中</div>
              <div class="state-arrow">→</div>
              <div class="state-node sn-ask" id="sn_ask">追问补全</div>
              <div class="state-arrow">→</div>
              <div class="state-node sn-confirm" id="sn_confirm">确认</div>
            </div>
          </div>
        </div>
        <!-- 实体提取 -->
        <div class="panel-card">
          <div class="panel-card-hd">实体提取 <span style="font-size:11px;font-weight:400;color:#999" id="entitySrc">—</span></div>
          <div class="panel-card-bd">
            <div style="font-size:11px;color:#999;margin-bottom:4px">识别到的实体</div>
            <div class="entity-chips" id="entityChips"><span style="color:#ccc;font-size:12px">等待输入…</span></div>
          </div>
        </div>
        <!-- 意图置信度 -->
        <div class="panel-card">
          <div class="panel-card-hd">意图置信度分布</div>
          <div class="panel-card-bd">
            <div class="intent-bars" id="intentBars">
              <div class="intent-bar-row"><div class="intent-name">建单</div><div class="ibar-wrap"><div class="ibar ibar-low" style="width:0%"></div></div><div class="ipct" style="color:#ccc">—</div></div>
              <div class="intent-bar-row"><div class="intent-name">推荐运力</div><div class="ibar-wrap"><div class="ibar ibar-low" style="width:0%"></div></div><div class="ipct" style="color:#ccc">—</div></div>
              <div class="intent-bar-row"><div class="intent-name">查数据</div><div class="ibar-wrap"><div class="ibar ibar-low" style="width:0%"></div></div><div class="ipct" style="color:#ccc">—</div></div>
              <div class="intent-bar-row"><div class="intent-name">匹配单据</div><div class="ibar-wrap"><div class="ibar ibar-low" style="width:0%"></div></div><div class="ipct" style="color:#ccc">—</div></div>
              <div class="intent-bar-row"><div class="intent-name">导入数据</div><div class="ibar-wrap"><div class="ibar ibar-low" style="width:0%"></div></div><div class="ipct" style="color:#ccc">—</div></div>
            </div>
          </div>
        </div>
        <!-- 槽位状态 -->
        <div class="panel-card">
          <div class="panel-card-hd">槽位填充状态 <span style="font-size:11px;font-weight:400;color:#999" id="slotIntent">—</span></div>
          <div class="panel-card-bd">
            <table class="slot-table" id="slotTable">
              <thead><tr><th>槽位</th><th>必填</th><th>当前值</th><th>状态</th></tr></thead>
              <tbody id="slotTbody"><tr><td colspan="4" style="color:#ccc;text-align:center;padding:14px">等待意图锁定…</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SCENES = [
  { steps: [
    { type:'user', text:'帮我派个车去上海，钢材20吨' },
    { type:'thinking' },
    { type:'ai_intent', intent:'create_order', conf:0.95, layer:'第一层规则命中"派"→建单', scores:[95,5,0,0,0],
      entities:[{t:'ec-action',l:'ACTION: 派'},{t:'ec-route',l:'ROUTE_TO: 上海'},{t:'ec-cargo',l:'CARGO: 钢材'},{t:'ec-weight',l:'WEIGHT: 20吨'}],
      slots:[{n:'出发地',req:true,v:null},{n:'目的地',req:true,v:'上海'},{n:'货量',req:true,v:'20吨'},{n:'车型',req:true,v:null},{n:'货物类型',req:false,v:'钢材'}] },
    { type:'ai', text:'好的，请告诉我装货地点和需要的车型（13米 / 17.5米 / 9.6米）？',
      ask:['出发地：装货城市？','车型：13米 / 17.5米 / 其他？'],
      quick:['北京大兴，13米车','上海，17.5米','天津，9.6米'], state:'ask' },
    { type:'user', text:'北京大兴，13米车' },
    { type:'thinking' },
    { type:'ai_intent', intent:'create_order', conf:0.93, layer:'上下文锁定意图，填充槽位', scores:[93,4,2,1,0],
      entities:[{t:'ec-route',l:'ROUTE_FROM: 北京大兴'},{t:'ec-unknown',l:'VEHICLE: 13米'}],
      slots:[{n:'出发地',req:true,v:'北京大兴'},{n:'目的地',req:true,v:'上海'},{n:'货量',req:true,v:'20吨'},{n:'车型',req:true,v:'13米'},{n:'货物类型',req:false,v:'钢材'}] },
    { type:'confirm', fields:[['出发地','北京大兴'],['目的地','上海'],['货物','钢材 20吨'],['车型','13米车']], state:'confirm' },
    { type:'user', text:'确认' },
    { type:'success', text:'派车单已创建', no:'PC-2026-0716-001', state:'execute' }
  ]},
  { steps: [
    { type:'user', text:'北京到上海30吨' },
    { type:'thinking' },
    { type:'ai_intent', intent:'ambiguous', conf:0.48, layer:'LLM分类置信度<0.5，触发消歧', scores:[45,42,8,3,2],
      entities:[{t:'ec-route',l:'ROUTE_FROM: 北京'},{t:'ec-route',l:'ROUTE_TO: 上海'},{t:'ec-weight',l:'WEIGHT: 30吨'}], slots:[] },
    { type:'ai', text:'您是要建一张派车单，还是找一辆去上海的空车？',
      quick:['建派车单','找空车'], state:'classify' },
    { type:'user', text:'找空车' },
    { type:'thinking' },

let currentScene=0, stepIdx=0;

function switchDemo(tab){document.querySelectorAll('.demo-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');}

function loadScene(idx){
  currentScene=idx; stepIdx=0;
  document.querySelectorAll('.scene-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('chatMessages').innerHTML='';
  resetEngine(); setQuickBtns([]);
  addAiMsg('场景已切换，点击下方快捷词或输入文字开始演示。');
  const scene=SCENES[idx];
  const firstUser=scene.steps.find(s=>s.type==='user');
  if(firstUser)setQuickBtns([firstUser.text]);
}

function resetEngine(){
  setStateMachine('idle');
  document.getElementById('entitySrc').textContent='—';
  document.getElementById('entityChips').innerHTML='<span style="color:#ccc;font-size:12px">等待输入…</span>';
  renderIntentBars([0,0,0,0,0]);
  document.getElementById('slotIntent').textContent='—';
  document.getElementById('slotTbody').innerHTML='<tr><td colspan="4" style="color:#ccc;text-align:center;padding:14px">等待意图锁定…</td></tr>';
}

function setStateMachine(state){
  const map={idle:'sn_idle',classify:'sn_classify',execute:'sn_execute',ask:'sn_ask',confirm:'sn_confirm'};
  document.querySelectorAll('.state-node').forEach(n=>n.classList.remove('current'));
  const el=document.getElementById(map[state]||'sn_idle');
  if(el)el.classList.add('current');
}

function renderIntentBars(scores){
  const names=['建单','推荐运力','查数据','匹配单据','导入数据'];
  const maxS=Math.max(...scores,1);
  document.getElementById('intentBars').innerHTML=scores.map((s,i)=>{
    const pct=Math.round(s);
    const isPrimary=pct===maxS&&pct>0;
    return `<div class="intent-bar-row"><div class="intent-name">${names[i]}</div><div class="ibar-wrap"><div class="ibar ${isPrimary?'ibar-primary':'ibar-secondary'}" style="width:${pct}%"></div></div><div class="ipct" style="color:${isPrimary?'#0097cf':'#999'}">${pct>0?pct+'%':'—'}</div></div>`;
  }).join('');
}

function renderSlots(slots,intentName){
  if(!slots||!slots.length){document.getElementById('slotTbody').innerHTML='<tr><td colspan="4" style="color:#ccc;text-align:center;padding:14px">—</td></tr>';return;}
  document.getElementById('slotIntent').textContent=intentName||'';
  document.getElementById('slotTbody').innerHTML=slots.map(s=>{
    const req=s.req?'<span style="color:#f12222">●必填</span>':'<span style="color:#999">○选填</span>';
    const val=s.v?`<b>${s.v}</b>`:'<span style="color:#ccc">—</span>';
    const st=s.v?'<span class="slot-ok">✓ 已填</span>':'<span class="slot-miss">✗ 缺失</span>';
    return `<tr><td>${s.n}</td><td>${req}</td><td>${val}</td><td>${st}</td></tr>`;
  }).join('');
}

function renderEntities(entities,src){
  document.getElementById('entitySrc').textContent=src||'';
  document.getElementById('entityChips').innerHTML=!entities||!entities.length
    ?'<span style="color:#ccc;font-size:12px">未识别到实体</span>'
    :entities.map(e=>`<span class="entity-chip ${e.t}">${e.l}</span>`).join('');
}

function addUserMsg(text){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div class="msg-avatar avatar-user">我</div><div class="msg-bubble user-bubble">${escH(text)}</div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function addAiMsg(html){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='msg';
  d.innerHTML=`<div class="msg-avatar avatar-ai">AI</div><div class="msg-bubble ai-bubble">${html}</div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function addThinking(){return addAiMsg('<span class="thinking"><span>正在识别意图…</span><span class="dots"><span></span><span></span><span></span></span></span>');}

const intentLabels={create_order:'建单',recommend_carrier:'推荐运力',query_data:'查数据',match_document:'匹配单据',import_data:'导入数据',ambiguous:'⚠ 待消歧'};

function setQuickBtns(btns){
  document.getElementById('quickBtns').innerHTML=btns.map(b=>`<button class="quick-btn" onclick="quickSend('${b.replace(/'/g,'\\\'')}')">${b}</button>`).join('');
}
function quickSend(text){document.getElementById('chatInput').value=text;sendMsg();}
function inputKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function sendMsg(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();if(!text)return;
  inp.value='';setQuickBtns([]);
  playFromStep();
}

function playFromStep(){
  const scene=SCENES[currentScene];
  if(stepIdx>=scene.steps.length)return;
  const step=scene.steps[stepIdx];stepIdx++;

  if(step.type==='user'){
    addUserMsg(step.text);setStateMachine('classify');
    setTimeout(playFromStep,600);
  } else if(step.type==='thinking'){
    const el=addThinking();setTimeout(()=>{el.remove();playFromStep();},900);
  } else if(step.type==='ai_intent'){
    renderIntentBars(step.scores);
    renderEntities(step.entities,'正则+词典+LLM');
    renderSlots(step.slots, intentLabels[step.intent]||step.intent);
    const conf=Math.round(step.conf*100);
    const cc=step.conf>=0.85?'#14aa65':step.conf>=0.5?'#e35d00':'#f12222';
    const cl=step.conf>=0.85?'直接执行':step.conf>=0.5?'确认后执行':'主动追问';
    addAiMsg(`<div class="intent-card"><div class="intent-card-title">意图识别 — ${escH(step.layer)}</div>
      <div class="intent-row"><div class="intent-lbl">识别意图</div><div class="intent-val hi">${intentLabels[step.intent]||step.intent}</div></div>
      <div class="intent-row"><div class="intent-lbl">置信度</div><div class="conf-bar-wrap"><div class="conf-bar" style="width:${conf}%"></div></div><div class="conf-pct" style="color:${cc}">${conf}%</div></div>
      <div class="intent-row"><div class="intent-lbl">处理策略</div><div class="intent-val" style="color:${cc}">${cl}</div></div></div>`);
    setTimeout(playFromStep,400);
  } else if(step.type==='ai'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(escH(step.text)+(step.ask?'<div class="slot-ask">'+step.ask.map(a=>`<div>· <b>${escH(a)}</b></div>`).join('')+'</div>':''));
    if(step.quick)setQuickBtns(step.quick);
  } else if(step.type==='confirm'){
    if(step.state)setStateMachine(step.state);
    const rows=step.fields.map(f=>`<div class="confirm-row"><div class="confirm-lbl">${f[0]}</div><div class="confirm-val">${f[1]}</div></div>`).join('');
    addAiMsg(`<div class="confirm-card"><div class="confirm-card-title">✦ 请确认以下信息</div>${rows}<div class="btn-row"><button class="fn-btn fn-btn-primary" onclick="quickSend('确认')">确认执行</button><button class="fn-btn fn-btn-default" onclick="quickSend('取消')">取消</button></div></div>`);
  } else if(step.type==='success'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`<div class="success-card">✅ ${escH(step.text)}${step.no?`<br><span style="color:#999;font-size:11px">运单号：<b>${step.no}</b></span>`:''}<br><span style="font-size:11px;color:#888;margin-top:4px;display:block">调度员和司机均已收到通知。</span></div>`);
    setQuickBtns(['再建一张','查看运单','返回主页']);
  } else if(step.type==='ai_rec'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`为您推荐 3 辆候选车辆：<div class="rec-list">
      <div class="rec-item" onclick="this.classList.toggle('selected')"><div class="rec-item-top"><span class="rec-rank r1">1</span><b>京A·12345</b> · 张伟 · 13米重卡<span class="rec-reason">距离最近 12km</span></div><span style="color:#999;font-size:11px">北京大兴 · 状态：空闲</span></div>
      <div class="rec-item" onclick="this.classList.toggle('selected')"><div class="rec-item-top"><span class="rec-rank r2">2</span><b>京B·67890</b> · 李强 · 13米重卡<span class="rec-reason">装载率高</span></div><span style="color:#999;font-size:11px">北京朝阳 · 距28km</span></div>
      <div class="rec-item" onclick="this.classList.toggle('selected')"><div class="rec-item-top"><span class="rec-rank r3">3</span><b>京C·11111</b> · 王磊 · 17.5米<span class="rec-reason">时效匹配</span></div><span style="color:#999;font-size:11px">北京顺义 · 距35km</span></div>
    </div>`);
    setQuickBtns(['选第1辆','选第2辆','选第3辆']);
  } else if(step.type==='ai_data'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`<div class="intent-card"><div class="intent-card-title">查询结果 — 京A·12345</div>
      <div class="intent-row"><div class="intent-lbl">司机</div><div class="intent-val">张伟</div></div>
      <div class="intent-row"><div class="intent-lbl">当前状态</div><div class="intent-val" style="color:#14aa65">运输中 → 上海</div></div>
      <div class="intent-row"><div class="intent-lbl">当前运单</div><div class="intent-val">PC-2026-0716-001</div></div>
      <div class="intent-row"><div class="intent-lbl">今日里程</div><div class="intent-val">386 km</div></div>
      <div class="intent-row"><div class="intent-lbl">装载率</div><div class="intent-val">88%</div></div>
      <div class="intent-row"><div class="intent-lbl">预计到达</div><div class="intent-val">今日 18:00</div></div></div>`);
    setQuickBtns(['查今日营收','看运单详情','找其他空车']);
  } else if(step.type==='ai_import'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`<div class="intent-card"><div class="intent-card-title">字段映射预览（自动识别）</div>
      <div class="intent-row"><div class="intent-lbl">派车单号</div><div class="intent-val hi">→ order_no</div><div style="margin-left:auto;font-size:11px;color:#14aa65">95%</div></div>
      <div class="intent-row"><div class="intent-lbl">发货地</div><div class="intent-val hi">→ from_location</div><div style="margin-left:auto;font-size:11px;color:#14aa65">90%</div></div>
      <div class="intent-row"><div class="intent-lbl">收货地</div><div class="intent-val hi">→ to_location</div><div style="margin-left:auto;font-size:11px;color:#14aa65">90%</div></div>
      <div class="intent-row"><div class="intent-lbl">重量(吨)</div><div class="intent-val hi">→ weight</div><div style="margin-left:auto;font-size:11px;color:#14aa65">98%</div></div>
      <div class="intent-row"><div class="intent-lbl">备注</div><div class="intent-val warn">→ 未匹配</div><div style="margin-left:auto;font-size:11px;color:#e35d00">0%</div></div></div>
      <div class="btn-row" style="margin-top:8px"><button class="fn-btn fn-btn-primary">确认并导入</button><button class="fn-btn fn-btn-default" style="margin-left:6px">手动调整</button></div>`);
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  loadScene(0);
  document.getElementById('chatMessages').innerHTML='';
  addAiMsg('您好！我是物流管理助手，支持建单、找车、查数据、单据匹配、批量导入。<br><span style="color:#999;font-size:11px">请选择上方演示场景，或直接输入指令开始体验。</span>');
  setQuickBtns(['帮我派个车去上海，钢材20吨','有没有去上海的空车','那个单子怎么样了']);
});
