<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物流管理助手 — 意图识别交互原型</title>
<style>
:root{
  --bg-0:#0f1117;--bg-1:#141520;--bg-2:#1a1d2e;
  --border:#1e2030;--border-2:#2a2d42;
  --text-0:#f4f4f7;--text-1:#d0d2dc;--text-2:#8b8fa8;--text-3:#6b7280;
  --brand:#7c3aed;--brand-2:#5b4de8;--brand-hi:#a78bfa;
  --brand-soft:#2d2060;--brand-soft-2:#1e1b3a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Inter','PingFang SC',sans-serif;font-size:13px;color:var(--text-0);background:var(--bg-0);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
/* 顶栏 */
.topbar{height:48px;background:var(--bg-0);display:flex;align-items:center;padding:0 20px;gap:24px;flex-shrink:0;z-index:100;border-bottom:1px solid var(--border)}
.topbar-logo{color:#fff;font-size:14px;font-weight:600;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.topbar-logo::before{content:'';display:inline-block;width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#5b4de8);box-shadow:0 2px 8px rgba(124,58,237,.4)}
.topbar-nav a{color:var(--text-2);text-decoration:none;font-size:13px;padding:0 14px;height:48px;display:inline-flex;align-items:center;transition:color .15s}
.topbar-nav a:hover{color:var(--text-0)}
.topbar-nav a.active{color:#fff;border-bottom:2px solid var(--brand)}
/* 侧边栏 */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;background:var(--bg-1);border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto;padding:8px 0}
.sidebar-group-title{font-size:11px;color:var(--text-3);padding:12px 16px 6px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-item{height:34px;padding:0 14px;display:flex;align-items:center;font-size:13px;color:var(--text-1);cursor:pointer;white-space:nowrap;overflow:hidden;border-radius:6px;margin:1px 8px;transition:all .15s}
.sidebar-item:hover{background:var(--brand-soft-2);color:#fff}
.sidebar-item.active{background:var(--brand-soft);color:var(--brand-hi)}
/* 主内容 */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* 顶部 tab */
.demo-nav{background:var(--bg-0);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:4px;flex-shrink:0}
.demo-tab{height:38px;padding:0 14px;display:inline-flex;align-items:center;font-size:13px;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.demo-tab:hover{color:var(--text-0)}
.demo-tab.active{color:var(--brand-hi);font-weight:600;border-bottom-color:var(--brand)}
/* 两栏布局 */
.content-wrap{flex:1;overflow:hidden;display:flex;gap:0}
/* 左侧：对话 */
.chat-col{width:520px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-0);border-right:1px solid var(--border)}
.chat-header{padding:12px 16px;background:var(--bg-1);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-0);display:flex;align-items:center;gap:8px}
.chat-header span.badge{background:linear-gradient(135deg,#7c3aed,#5b4de8);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:transparent}
.chat-messages::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.avatar-ai{background:linear-gradient(135deg,#7c3aed,#5b4de8);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.avatar-user{background:#2a2d42;color:var(--text-1)}
.msg-bubble{max-width:78%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.65}
.ai-bubble{background:var(--bg-2);color:var(--text-0);border-radius:4px 12px 12px 12px;border:1px solid var(--border-2)}
.user-bubble{background:linear-gradient(135deg,#5b4de8,#7c3aed);color:#fff;border-radius:12px 4px 12px 12px;box-shadow:0 2px 12px rgba(124,58,237,.25)}
/* 意图卡片 */
.intent-card{background:var(--bg-2);border:1px solid var(--border-2);border-radius:8px;margin:8px 0;padding:12px;font-size:12px}
.intent-card-title{font-size:11px;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}
.intent-card-title::before{content:'';display:inline-block;width:3px;height:11px;background:var(--brand);border-radius:2px}
.intent-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.intent-row:last-child{border-bottom:none}
.intent-lbl{width:80px;color:var(--text-2);flex-shrink:0}
.intent-val{color:var(--text-0);font-weight:500}
.intent-val.hi{color:var(--brand-hi)}
.intent-val.warn{color:#fb923c}
.conf-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:0 10px}
.conf-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#5b4de8,#a78bfa)}
.conf-pct{width:36px;font-size:11px;font-weight:600;color:var(--brand-hi);text-align:right}
/* 追问 */
.slot-ask{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.3);border-radius:6px;padding:8px 10px;margin:6px 0;font-size:12px;color:#fbbf77}
.slot-ask b{color:#fb923c}
/* 确认卡 */
.confirm-card{background:var(--bg-2);border:1px solid rgba(124,58,237,.4);border-radius:8px;padding:12px;margin:8px 0}
.confirm-card-title{font-size:12px;color:var(--brand-hi);margin-bottom:8px;font-weight:600}
.confirm-row{display:flex;gap:8px;padding:4px 0;font-size:12px}
.confirm-lbl{width:64px;color:var(--text-2);flex-shrink:0}
.confirm-val{color:var(--text-0);font-weight:500}
.btn-row{display:flex;gap:8px;margin-top:12px}
.fn-btn{height:30px;padding:0 14px;border-radius:6px;font-size:12px;cursor:pointer;border:none;display:inline-flex;align-items:center;font-family:inherit;transition:all .15s}
.fn-btn-primary{background:linear-gradient(135deg,#5b4de8,#7c3aed);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.fn-btn-primary:hover{opacity:.92;transform:translateY(-1px)}
.fn-btn-default{background:transparent;border:1px solid var(--border-2);color:var(--text-1)}
.fn-btn-default:hover{border-color:var(--brand);color:var(--brand-hi)}
.fn-btn-danger{background:transparent;border:1px solid rgba(239,68,68,.4);color:#ef4444}
/* 成功卡 */
.success-card{background:#0d2015;border:1px solid #22c55e;border-radius:8px;padding:12px;margin:8px 0;font-size:12px;color:#86efac}
/* 推荐列表 */
.rec-list{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.rec-item{border:1px solid var(--border-2);background:var(--bg-2);border-radius:8px;padding:10px 12px;cursor:pointer;font-size:12px;transition:all .15s;color:var(--text-1)}
.rec-item:hover{background:var(--brand-soft-2);border-color:var(--brand)}
.rec-item.selected{background:var(--brand-soft-2);border-color:var(--brand-hi);box-shadow:0 0 0 2px rgba(124,58,237,.2)}
.rec-item-top{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.rec-rank{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.r1{background:linear-gradient(135deg,#f6c000,#e8a000)}
.r2{background:#6b7280}.r3{background:#b87333}
.rec-reason{font-size:10px;color:var(--brand-hi);background:var(--brand-soft);padding:2px 8px;border-radius:4px}
/* 输入区 */
.chat-input-area{border-top:1px solid var(--border);padding:12px 14px 10px;background:var(--bg-1);display:flex;flex-direction:column;gap:8px}
.input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;border:1px solid var(--border-2);border-radius:10px;padding:10px 12px;font-size:13px;resize:none;outline:none;font-family:inherit;color:var(--text-0);line-height:1.5;background:var(--bg-2);transition:border-color .15s}
.chat-textarea::placeholder{color:var(--text-3)}
.chat-textarea:focus{border-color:var(--brand)}
.send-btn{height:48px;padding:0 18px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:linear-gradient(135deg,#5b4de8,#7c3aed);color:#fff;font-weight:600;box-shadow:0 2px 10px rgba(124,58,237,.35);transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.send-btn:hover{opacity:.92;transform:translateY(-1px)}
/* 快捷按钮 */
.quick-btns{display:flex;flex-wrap:wrap;gap:6px}
.quick-btn{padding:5px 12px;background:transparent;border:1px solid var(--border-2);border-radius:14px;font-size:12px;color:var(--text-1);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.quick-btn:hover{border-color:var(--brand);color:var(--brand-hi);background:var(--brand-soft-2)}
/* 技能栏 */
.skill-bar{display:flex;align-items:center;gap:2px;padding-top:8px;overflow:visible}
.skill-add{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--text-3);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-right:4px}
.skill-add:hover{background:var(--brand-soft-2);color:var(--brand-hi)}
.skill-divider{width:1px;height:16px;background:var(--border-2);margin:0 6px;flex-shrink:0}
.skill-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;font-size:12px;color:var(--text-3);background:transparent;border:none;flex-shrink:0;transition:all .15s;font-family:inherit}
.skill-btn:hover{background:var(--brand-soft-2);color:#fff}
.skill-btn.active{background:var(--brand-soft);color:var(--brand-hi)}
.skill-btn .sk-icon{font-size:14px;line-height:1}
.skill-btn .sk-label{font-size:12px;font-weight:500}
/* 技能选择（预留） */
.skills-row{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:4px}
.skill-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border:1px solid var(--border-2);border-radius:14px;font-size:12px;color:var(--text-1);cursor:pointer;background:transparent;white-space:nowrap;transition:all .15s}
.skill-pill:hover{border-color:var(--brand);background:var(--brand-soft-2);color:var(--brand-hi)}
.skill-pill.active{background:var(--brand-soft);color:var(--brand-hi);border-color:var(--brand)}
.skill-pill .sp-icon{font-size:13px}
/* 意图引擎 */
.engine-col{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg-0)}
.engine-col::-webkit-scrollbar{width:6px}
.engine-col::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.panel-card{background:var(--bg-1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-card-hd{background:var(--bg-2);padding:10px 14px;font-size:12px;font-weight:600;color:var(--brand-hi);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.4px}
.panel-card-bd{padding:14px}
/* 五层漏斗（预留） */
.funnel{display:flex;flex-direction:column;gap:4px}
.funnel-layer{border-radius:6px;overflow:hidden;border:1px solid var(--border-2)}
.funnel-layer-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--text-1)}
.funnel-layer-bd{padding:6px 12px 8px;font-size:11px;color:var(--text-2);background:var(--bg-2);border-top:1px solid var(--border)}
.layer-num{width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,#5b4de8,#7c3aed)}
.layer-status{margin-left:auto;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:600}
.st-hit{background:rgba(34,197,94,.12);color:#86efac}
.st-skip{background:var(--bg-2);color:var(--text-3)}
.st-active{background:var(--brand-soft);color:var(--brand-hi)}
.st-wait{background:var(--bg-2);color:var(--text-3)}
/* 实体 */
.entity-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.entity-chip{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;border:1px solid}
.ec-action{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.35)}
.ec-route{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.35)}
.ec-weight{background:rgba(251,146,60,.12);color:#fbbf77;border-color:rgba(251,146,60,.35)}
.ec-cargo{background:rgba(167,139,250,.12);color:#c4b5fd;border-color:rgba(167,139,250,.35)}
.ec-plate{background:rgba(236,72,153,.12);color:#f9a8d4;border-color:rgba(236,72,153,.35)}
.ec-time{background:rgba(96,165,250,.12);color:#93c5fd;border-color:rgba(96,165,250,.35)}
.ec-unknown{background:rgba(148,163,184,.12);color:#cbd5e1;border-color:rgba(148,163,184,.35)}
/* 意图对比 */
.intent-bars{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.intent-bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.intent-name{width:70px;color:var(--text-1);font-weight:500;flex-shrink:0;font-size:11px}
.ibar-wrap{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.ibar{height:100%;border-radius:4px;transition:width .4s ease}
.ibar-primary{background:linear-gradient(90deg,#5b4de8,#a78bfa)}
.ibar-secondary{background:linear-gradient(90deg,#3f4256,#5f6480)}
.ibar-low{background:rgba(255,255,255,.06)}
.ipct{width:36px;font-size:11px;font-weight:600;text-align:right;flex-shrink:0}
/* 槽位表 */
.slot-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.slot-table th{background:var(--bg-2);padding:7px 10px;text-align:left;font-weight:600;color:var(--text-2);border:1px solid var(--border-2);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.slot-table td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle;color:var(--text-1)}
.slot-table tr:nth-child(even) td{background:var(--bg-1)}
.slot-ok{color:#22c55e;font-weight:600}
.slot-miss{color:#ef4444;font-weight:600}
.slot-infer{color:#fb923c;font-weight:600}
/* 状态机 */
.state-machine{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.state-node{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;border:1.5px solid;background:var(--bg-2);transition:all .2s}
.sn-idle{color:var(--text-2);border-color:var(--border-2)}
.sn-classify{color:#93c5fd;border-color:rgba(59,130,246,.5)}
.sn-execute{color:#86efac;border-color:rgba(34,197,94,.5)}
.sn-ask{color:#fbbf77;border-color:rgba(251,146,60,.5)}
.sn-confirm{color:var(--brand-hi);border-color:rgba(124,58,237,.5)}
.state-arrow{color:var(--text-3);font-size:14px;font-weight:600}
.state-node.current{background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(91,77,232,.18));border-color:var(--brand);color:var(--brand-hi);box-shadow:0 0 0 3px rgba(124,58,237,.3)}
/* thinking */
.thinking{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--brand-hi);padding:8px 12px;background:var(--brand-soft-2);border:1px solid rgba(124,58,237,.3);border-radius:6px}
.dots span{display:inline-block;width:5px;height:5px;background:var(--brand-hi);border-radius:50%;margin:0 1px;animation:blink 1s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* 场景选择 */
.scene-bar{background:var(--bg-1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.scene-label{font-size:12px;color:var(--text-2)}
.scene-btn{padding:5px 14px;border:1px solid var(--border-2);border-radius:14px;font-size:12px;color:var(--text-1);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.scene-btn:hover{border-color:var(--brand);color:var(--brand-hi)}
.scene-btn.active{background:linear-gradient(135deg,#5b4de8,#7c3aed);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px rgba(124,58,237,.3)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">物流管理助手</div>
  <nav class="topbar-nav">
    <a href="#" class="active">智能助手</a>
    <a href="#">运单管理</a>
    <a href="#">车辆管理</a>
    <a href="#">数据报表</a>
  </nav>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-group-title">智能助手</div>
    <div class="sidebar-item active">物流助手</div>
    <div class="sidebar-item">对话记录</div>
    <div class="sidebar-group-title">快捷功能</div>
    <div class="sidebar-item">快速建单</div>
    <div class="sidebar-item">找空车</div>
    <div class="sidebar-item">数据查询</div>
    <div class="sidebar-item">单据匹配</div>
    <div class="sidebar-item">批量导入</div>
  </div>
  <div class="main">
    <div class="demo-nav">
      <div class="demo-tab active" onclick="switchDemo('chat')">对话演示</div>
      <div class="demo-tab" onclick="switchDemo('engine')">意图引擎详解</div>
      <div class="demo-tab" onclick="switchDemo('funnel')">五层漏斗</div>
    </div>
    <!-- 场景快选 -->
    <div class="scene-bar">
      <span class="scene-label">演示场景</span>
      <button class="scene-btn active" onclick="loadScene(0)">建单（高置信）</button>
      <button class="scene-btn" onclick="loadScene(1)">找车（中置信·追问）</button>
      <button class="scene-btn" onclick="loadScene(2)">查数据（低置信）</button>
      <button class="scene-btn" onclick="loadScene(3)">匹配单据</button>
      <button class="scene-btn" onclick="loadScene(4)">批量导入</button>
      <button class="scene-btn" onclick="loadScene(5)">意图边界消歧</button>
    </div>
    <div class="content-wrap">
      <!-- 左侧对话 -->
      <div class="chat-col" id="chatCol">
        <div class="chat-header">
          <span>物流管理助手</span>
          <span class="badge">AI</span>
          <span style="margin-left:auto;font-size:11px;color:#22c55e;font-weight:500;display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;background:#22c55e;border-radius:50%;box-shadow:0 0 6px #22c55e"></span>在线</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div id="quickBtns" class="quick-btns"></div>
          <div class="input-row">
            <textarea class="chat-textarea" id="chatInput" rows="2" placeholder="输入运输指令，支持自然语言…" onkeydown="inputKeyDown(event)"></textarea>
            <button class="send-btn" onclick="sendMsg()">发送</button>
          </div>
          <div class="skill-bar">
            <div class="skill-add" title="更多">+</div>
            <div class="skill-divider"></div>
            <div class="skill-btn" onclick="useSkill('create')" id="sk_create"><span class="sk-icon">＋</span><span class="sk-label">建单</span></div>
            <div class="skill-btn" onclick="useSkill('recommend')" id="sk_recommend"><span class="sk-icon">◈</span><span class="sk-label">找车</span></div>
            <div class="skill-btn" onclick="useSkill('query')" id="sk_query"><span class="sk-icon">◧</span><span class="sk-label">查数据</span></div>
            <div class="skill-btn" onclick="useSkill('match')" id="sk_match"><span class="sk-icon">⇌</span><span class="sk-label">匹配单据</span></div>
            <div class="skill-btn" onclick="useSkill('import')" id="sk_import"><span class="sk-icon">↥</span><span class="sk-label">批量导入</span></div>
          </div>
        </div>
      </div>
      <!-- 右侧引擎可视化 -->
      <div class="engine-col" id="engineCol">
        <!-- 状态机 -->
        <div class="panel-card">

</div>

let currentScene=0, stepIdx=0;

function switchDemo(tab){document.querySelectorAll('.demo-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');}

function loadScene(idx){
  currentScene=idx; stepIdx=0;
  document.querySelectorAll('.scene-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('chatMessages').innerHTML='';
  resetEngine(); setQuickBtns([]);
  addAiMsg('场景已切换，点击下方快捷词或输入文字开始演示。');
  const scene=SCENES[idx];
  const firstUser=scene.steps.find(s=>s.type==='user');
  if(firstUser)setQuickBtns([firstUser.text]);
}

function resetEngine(){
  setStateMachine('idle');
  document.getElementById('entitySrc').textContent='—';
  document.getElementById('entityChips').innerHTML='<span style="color:#ccc;font-size:12px">等待输入…</span>';
  renderIntentBars([0,0,0,0,0]);
  document.getElementById('slotIntent').textContent='—';
  document.getElementById('slotTbody').innerHTML='<tr><td colspan="4" style="color:#ccc;text-align:center;padding:14px">等待意图锁定…</td></tr>';
}

function setStateMachine(state){
  const map={idle:'sn_idle',classify:'sn_classify',execute:'sn_execute',ask:'sn_ask',confirm:'sn_confirm'};
  document.querySelectorAll('.state-node').forEach(n=>n.classList.remove('current'));
  const el=document.getElementById(map[state]||'sn_idle');
  if(el)el.classList.add('current');
}

function renderIntentBars(scores){
  const names=['建单','推荐运力','查数据','匹配单据','导入数据'];
  const maxS=Math.max(...scores,1);
  document.getElementById('intentBars').innerHTML=scores.map((s,i)=>{
    const pct=Math.round(s);
    const isPrimary=pct===maxS&&pct>0;
    return `<div class="intent-bar-row"><div class="intent-name">${names[i]}</div><div class="ibar-wrap"><div class="ibar ${isPrimary?'ibar-primary':'ibar-secondary'}" style="width:${pct}%"></div></div><div class="ipct" style="color:${isPrimary?'#0097cf':'#999'}">${pct>0?pct+'%':'—'}</div></div>`;
  }).join('');
}

function renderSlots(slots,intentName){
  if(!slots||!slots.length){document.getElementById('slotTbody').innerHTML='<tr><td colspan="4" style="color:#ccc;text-align:center;padding:14px">—</td></tr>';return;}
  document.getElementById('slotIntent').textContent=intentName||'';
  document.getElementById('slotTbody').innerHTML=slots.map(s=>{
    const req=s.req?'<span style="color:#f12222">●必填</span>':'<span style="color:#999">○选填</span>';
    const val=s.v?`<b>${s.v}</b>`:'<span style="color:#ccc">—</span>';
    const st=s.v?'<span class="slot-ok">✓ 已填</span>':'<span class="slot-miss">✗ 缺失</span>';
    return `<tr><td>${s.n}</td><td>${req}</td><td>${val}</td><td>${st}</td></tr>`;
  }).join('');
}

function renderEntities(entities,src){
  document.getElementById('entitySrc').textContent=src||'';
  document.getElementById('entityChips').innerHTML=!entities||!entities.length
    ?'<span style="color:#ccc;font-size:12px">未识别到实体</span>'
    :entities.map(e=>`<span class="entity-chip ${e.t}">${e.l}</span>`).join('');
}

function addUserMsg(text){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div class="msg-avatar avatar-user">我</div><div class="msg-bubble user-bubble">${escH(text)}</div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function addAiMsg(html){
  const msgs=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='msg';
  d.innerHTML=`<div class="msg-avatar avatar-ai">AI</div><div class="msg-bubble ai-bubble">${html}</div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function addThinking(){return addAiMsg('<span class="thinking"><span>正在识别意图…</span><span class="dots"><span></span><span></span><span></span></span></span>');}

const intentLabels={create_order:'建单',recommend_carrier:'推荐运力',query_data:'查数据',match_document:'匹配单据',import_data:'导入数据',ambiguous:'⚠ 待消歧'};

function setQuickBtns(btns){
  document.getElementById('quickBtns').innerHTML=btns.map(b=>`<button class="quick-btn" onclick="quickSend('${b.replace(/'/g,'\\\'')}')">${b}</button>`).join('');
}
function quickSend(text){document.getElementById('chatInput').value=text;sendMsg();}
function inputKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function sendMsg(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();if(!text)return;
  inp.value='';setQuickBtns([]);
  playFromStep();
}

function playFromStep(){
  const scene=SCENES[currentScene];
  if(stepIdx>=scene.steps.length)return;
  const step=scene.steps[stepIdx];stepIdx++;

  if(step.type==='user'){
    addUserMsg(step.text);setStateMachine('classify');
    setTimeout(playFromStep,600);
  } else if(step.type==='thinking'){
    const el=addThinking();setTimeout(()=>{el.remove();playFromStep();},900);
  } else if(step.type==='ai_intent'){
    renderIntentBars(step.scores);
    renderEntities(step.entities,'正则+词典+LLM');
    renderSlots(step.slots, intentLabels[step.intent]||step.intent);
    const conf=Math.round(step.conf*100);
    const cc=step.conf>=0.85?'#14aa65':step.conf>=0.5?'#e35d00':'#f12222';
    const cl=step.conf>=0.85?'直接执行':step.conf>=0.5?'确认后执行':'主动追问';
    addAiMsg(`<div class="intent-card"><div class="intent-card-title">意图识别 — ${escH(step.layer)}</div>
      <div class="intent-row"><div class="intent-lbl">识别意图</div><div class="intent-val hi">${intentLabels[step.intent]||step.intent}</div></div>
      <div class="intent-row"><div class="intent-lbl">置信度</div><div class="conf-bar-wrap"><div class="conf-bar" style="width:${conf}%"></div></div><div class="conf-pct" style="color:${cc}">${conf}%</div></div>
      <div class="intent-row"><div class="intent-lbl">处理策略</div><div class="intent-val" style="color:${cc}">${cl}</div></div></div>`);
    setTimeout(playFromStep,400);
  } else if(step.type==='ai'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(escH(step.text)+(step.ask?'<div class="slot-ask">'+step.ask.map(a=>`<div>· <b>${escH(a)}</b></div>`).join('')+'</div>':''));
    if(step.quick)setQuickBtns(step.quick);
  } else if(step.type==='confirm'){
    if(step.state)setStateMachine(step.state);
    const rows=step.fields.map(f=>`<div class="confirm-row"><div class="confirm-lbl">${f[0]}</div><div class="confirm-val">${f[1]}</div></div>`).join('');
    addAiMsg(`<div class="confirm-card"><div class="confirm-card-title">✦ 请确认以下信息</div>${rows}<div class="btn-row"><button class="fn-btn fn-btn-primary" onclick="quickSend('确认')">确认执行</button><button class="fn-btn fn-btn-default" onclick="quickSend('取消')">取消</button></div></div>`);
  } else if(step.type==='success'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`<div class="success-card">✅ ${escH(step.text)}${step.no?`<br><span style="color:#999;font-size:11px">运单号：<b>${step.no}</b></span>`:''}<br><span style="font-size:11px;color:#888;margin-top:4px;display:block">调度员和司机均已收到通知。</span></div>`);
    setQuickBtns(['再建一张','查看运单','返回主页']);
  } else if(step.type==='ai_rec'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`为您推荐 3 辆候选车辆：<div class="rec-list">
      <div class="rec-item" onclick="this.classList.toggle('selected')"><div class="rec-item-top"><span class="rec-rank r1">1</span><b>京A·12345</b> · 张伟 · 13米重卡<span class="rec-reason">距离最近 12km</span></div><span style="color:#999;font-size:11px">北京大兴 · 状态：空闲</span></div>
      <div class="rec-item" onclick="this.classList.toggle('selected')"><div class="rec-item-top"><span class="rec-rank r2">2</span><b>京B·67890</b> · 李强 · 13米重卡<span class="rec-reason">装载率高</span></div><span style="color:#999;font-size:11px">北京朝阳 · 距28km</span></div>
      <div class="rec-item" onclick="this.classList.toggle('selected')"><div class="rec-item-top"><span class="rec-rank r3">3</span><b>京C·11111</b> · 王磊 · 17.5米<span class="rec-reason">时效匹配</span></div><span style="color:#999;font-size:11px">北京顺义 · 距35km</span></div>
    </div>`);
    setQuickBtns(['选第1辆','选第2辆','选第3辆']);
  } else if(step.type==='ai_data'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`<div class="intent-card"><div class="intent-card-title">查询结果 — 京A·12345</div>
      <div class="intent-row"><div class="intent-lbl">司机</div><div class="intent-val">张伟</div></div>
      <div class="intent-row"><div class="intent-lbl">当前状态</div><div class="intent-val" style="color:#14aa65">运输中 → 上海</div></div>
      <div class="intent-row"><div class="intent-lbl">当前运单</div><div class="intent-val">PC-2026-0716-001</div></div>
      <div class="intent-row"><div class="intent-lbl">今日里程</div><div class="intent-val">386 km</div></div>
      <div class="intent-row"><div class="intent-lbl">装载率</div><div class="intent-val">88%</div></div>
      <div class="intent-row"><div class="intent-lbl">预计到达</div><div class="intent-val">今日 18:00</div></div></div>`);
    setQuickBtns(['查今日营收','看运单详情','找其他空车']);
  } else if(step.type==='ai_import'){
    if(step.state)setStateMachine(step.state);
    addAiMsg(`<div class="intent-card"><div class="intent-card-title">字段映射预览（自动识别）</div>
      <div class="intent-row"><div class="intent-lbl">派车单号</div><div class="intent-val hi">→ order_no</div><div style="margin-left:auto;font-size:11px;color:#14aa65">95%</div></div>
      <div class="intent-row"><div class="intent-lbl">发货地</div><div class="intent-val hi">→ from_location</div><div style="margin-left:auto;font-size:11px;color:#14aa65">90%</div></div>
      <div class="intent-row"><div class="intent-lbl">收货地</div><div class="intent-val hi">→ to_location</div><div style="margin-left:auto;font-size:11px;color:#14aa65">90%</div></div>
      <div class="intent-row"><div class="intent-lbl">重量(吨)</div><div class="intent-val hi">→ weight</div><div style="margin-left:auto;font-size:11px;color:#14aa65">98%</div></div>
      <div class="intent-row"><div class="intent-lbl">备注</div><div class="intent-val warn">→ 未匹配</div><div style="margin-left:auto;font-size:11px;color:#e35d00">0%</div></div></div>
      <div class="btn-row" style="margin-top:8px"><button class="fn-btn fn-btn-primary">确认并导入</button><button class="fn-btn fn-btn-default" style="margin-left:6px">手动调整</button></div>`);
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  loadScene(0);
  document.getElementById('chatMessages').innerHTML='';
  addAiMsg('您好！我是物流管理助手，支持建单、找车、查数据、单据匹配、批量导入。<br><span style="color:#999;font-size:11px">请选择上方演示场景，或直接输入指令开始体验。</span>');
  setQuickBtns(['帮我派个车去上海，钢材20吨','有没有去上海的空车','那个单子怎么样了']);
});
const skillSceneMap={create:0,recommend:1,query:2,match:3,import:4};
const skillPlaceholder={
  create:'输入建单信息，例如：帮我派个车去上海，钢材20吨…',
  recommend:'输入找车需求，例如：有没有去上海的空车…',
  query:'输入查询条件，例如：昨天发了多少吨…',
  match:'输入匹配指令，例如：把PC-001派给京A12345…',
  import:'输入导入指令，例如：导入昨天收到的回单照片…'
};
var activeSkill=null;
function useSkill(type){
  if(activeSkill===type){
    activeSkill=null;
    document.querySelectorAll('.skill-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('chatInput').placeholder='输入运输指令，支持自然语言…';
    return;
  }
  activeSkill=type;
  document.querySelectorAll('.skill-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sk_'+type).classList.add('active');
  document.getElementById('chatInput').placeholder=skillPlaceholder[type]||'输入指令…';
  document.getElementById('chatInput').focus();
  // 同步切换演示场景
  var idx=skillSceneMap[type];
  if(idx!==undefined){
    document.querySelectorAll('.scene-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
    loadScene(idx);
  }
}
</script>
